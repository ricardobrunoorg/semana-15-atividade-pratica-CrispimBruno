<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesa Aberta | Entrar</title>
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>

<body class="pagina-login">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-emblema">&#9861;</div>
      <h1>Mesa Aberta</h1>
      <p class="login-subtitulo">Entre para favoritar seus jogos preferidos</p>

      <form id="login-form" class="form-mesa">
        <div class="campo">
          <label for="username">Login</label>
          <input type="text" name="username" id="username" autocomplete="username">
        </div>
        <div class="campo">
          <label for="password">Senha</label>
          <input type="password" name="password" id="password" autocomplete="current-password">
        </div>
        <button type="submit" class="botao-primario">Entrar</button>
        <button type="button" class="botao-secundario" id="btn_abrir_registro">Criar conta</button>
      </form>

      <p class="login-dica">Dica: admin / 123 ou user / 123</p>
    </div>
  </div>

  <!-- Painel de registro -->
  <div id="registro-overlay" class="registro-overlay" hidden>
    <div class="registro-card">
      <button type="button" class="fechar" id="btn_fechar_registro" aria-label="Fechar">&times;</button>
      <h2>Nova conta</h2>
      <form id="registro-form" class="form-mesa">
        <div class="campo">
          <label for="txt_login">Usuário</label>
          <input type="text" id="txt_login">
        </div>
        <div class="campo">
          <label for="txt_nome">Nome completo</label>
          <input type="text" id="txt_nome">
        </div>
        <div class="campo">
          <label for="txt_email">E-mail</label>
          <input type="email" id="txt_email">
        </div>
        <div class="campo">
          <label for="txt_senha">Senha</label>
          <input type="password" id="txt_senha">
        </div>
        <div class="campo">
          <label for="txt_senha2">Confirmação de senha</label>
          <input type="password" id="txt_senha2">
        </div>
        <button type="submit" class="botao-primario">Salvar</button>
      </form>
    </div>
  </div>

  <script src="../../assets/js/login.js"></script>
  <script>
    function processaFormLogin(event) {
      event.preventDefault();

      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;

      var resultadoLogin = loginUser(username, password);
      if (resultadoLogin) {
        window.location.href = RETURN_URL;
      } else {
        alert('Usuário ou senha incorretos');
      }
    }

    function salvaRegistro(event) {
      event.preventDefault();

      let login = document.getElementById('txt_login').value;
      let nome = document.getElementById('txt_nome').value;
      let email = document.getElementById('txt_email').value;
      let senha = document.getElementById('txt_senha').value;
      let senha2 = document.getElementById('txt_senha2').value;

      if (!login || !nome || !senha) {
        alert('Preencha usuário, nome e senha.');
        return;
      }
      if (senha != senha2) {
        alert('As senhas informadas não conferem.');
        return;
      }

      addUser(nome, login, senha, email);
      alert('Usuário criado com sucesso. Faça login para continuar.');
      document.getElementById('registro-overlay').hidden = true;
    }

    document.getElementById('login-form').addEventListener('submit', processaFormLogin);
    document.getElementById('registro-form').addEventListener('submit', salvaRegistro);
    document.getElementById('btn_abrir_registro').addEventListener('click', function () {
      document.getElementById('registro-overlay').hidden = false;
    });
    document.getElementById('btn_fechar_registro').addEventListener('click', function () {
      document.getElementById('registro-overlay').hidden = true;
    });
  </script>
</body>

</html>
